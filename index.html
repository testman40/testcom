<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Twitch Test</title>
    <script src="https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/dist/tmi.min.js"></script>
</head>
<body style="padding: 20px;">
    <h3>接続テスト</h3>
    <p id="status">確認中...</p>
    <button onclick="start()" style="padding: 10px; background: #6441a5; color: white; border: none; border-radius: 5px;">接続を開始する</button>

    <script>
        function start() {
            const statusEl = document.getElementById('status');
            statusEl.innerText = '接続を試みています...';

            const client = new tmi.Client({
                // secure: true を入れることで、Twitchの「正式な暗号化通信」を使います
                connection: { reconnect: true, secure: true },
                channels: ['tachinsan']
            });

            client.connect().then(() => {
                statusEl.innerText = '✅ 接続成功！チャットを打ってみてください';
            }).catch(err => {
                statusEl.innerText = '❌ 接続失敗: ' + err;
            });

            client.on('message', (channel, tags, message, self) => {
                const uttr = new SpeechSynthesisUtterance(message);
                uttr.lang = 'ja-JP';
                window.speechSynthesis.speak(uttr);
            });
        }
    </script>
</body>
</html>
