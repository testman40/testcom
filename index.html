<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Reader Ultimate</title>
    <script>
    /* tmi.js v1.8.5 (embedded) */

<body style="font-family: sans-serif; background-color: #f0f0f0; padding: 20px;">
    <div style="background: white; border-radius: 10px; padding: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
        <h1 style="font-size: 18px; margin-top: 0;">Twitch 読み上げくん</h1>
        <p>状態: <span id="status" style="font-weight:bold; color:red;">接続中...</span></p>
        <div id="log" style="border:1px solid #ddd; padding:10px; height:300px; overflow-y:scroll; background:#fafafa; font-size: 14px;"></div>
    </div>

    <script>
        // ページを読み込んだらすぐに実行
        (function() {
            const statusEl = document.getElementById('status');
            
            // 万が一の読み込みチェック
            if (typeof tmi === 'undefined') {
                // ここでエラーが出る場合は、外部CDNから強制読み込み
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/dist/tmi.min.js';
                script.onload = start;
                document.head.appendChild(script);
            } else {
                start();
            }

            function start() {
                const client = new tmi.Client({
                    connection: { 
                    reconnect: true, 
                    secure: true,
                    timeout: 30000 
                    },
                    channels: ['tachinsan']
                });

                client.connect().then(() => {
                    statusEl.innerText = '接続成功！(tachinsan)';
                    statusEl.style.color = 'green';
                }).catch(err => {
                    statusEl.innerText = '接続失敗: ' + err;
                });

                client.on('message', (channel, tags, message, self) => {
                    const log = document.getElementById('log');
                    const name = tags['display-name'] || tags.username;
                    log.innerHTML += `<div style="margin-bottom:5px;"><strong>${name}:</strong> ${message}</div>`;
                    log.scrollTop = log.scrollHeight;

                    // 音声読み上げ
                    const uttr = new SpeechSynthesisUtterance(message);
                    uttr.lang = 'ja-JP';
                    window.speechSynthesis.speak(uttr);
                });
            }
        })();
    </script>
</body>
</html>
