<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Reader</title>
</head>
<body style="font-family: sans-serif; padding: 20px; background-color: #f4f4f9;">
    <div style="max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h1 style="font-size: 20px; color: #6441a5;">Twitch 読み上げくん</h1>
        <p>状態: <span id="status" style="font-weight:bold; color:red;">準備中...</span></p>
        <div id="log" style="border:1px solid #ddd; padding:10px; height:300px; overflow-y:scroll; background:#fafafa; border-radius: 8px;"></div>
        <p style="font-size: 12px; color: #888; margin-top: 10px;">※起動しない場合は、画面を一度タップしてください</p>
    </div>

    <script>
        // 外部サーバーを使わず、GitHubが提供する別の配信ルートに切り替えます
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/dist/tmi.min.js';
        
        script.onload = function() {
            const client = new tmi.Client({
                connection: { reconnect: true, secure: true },
                channels: ['tachinsan']
            });

            client.connect().then(() => {
                const statusEl = document.getElementById('status');
                statusEl.innerText = '接続成功！ (tachinsan)';
                statusEl.style.color = 'green';
            }).catch(err => {
                document.getElementById('status').innerText = '接続失敗: ' + err;
            });

            client.on('message', (channel, tags, message, self) => {
                const log = document.getElementById('log');
                log.innerHTML += `<p style="margin: 5px 0;"><strong>${tags['display-name'] || tags.username}:</strong> ${message}</p>`;
                log.scrollTop = log.scrollHeight;

                const uttr = new SpeechSynthesisUtterance(message);
                uttr.lang = 'ja-JP';
                window.speechSynthesis.speak(uttr);
            });
        };

        script.onerror = function() {
            document.getElementById('status').innerText = '通信エラーが発生しました。Wi-Fiを切って試してみてください。';
        };

        document.head.appendChild(script);
    </script>
</body>
</html>
