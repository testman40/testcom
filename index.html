<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Reader</title>
</head>
<body>
    <h1 style="font-size: 20px;">Twitch 読み上げくん</h1>
    <p>現在の状態: <span id="status" style="font-weight:bold; color:red;">準備中...</span></p>
    <div id="log" style="border:1px solid #ccc; padding:10px; height:300px; overflow-y:scroll; font-size:14px;"></div>

    <script src="https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/dist/tmi.min.js"></script>

    <script>
        // 5秒待ってから確実に起動させる関数
        function connectTwitch() {
            const statusEl = document.getElementById('status');
            
            if (typeof tmi === 'undefined') {
                statusEl.innerText = '道具の読み込みを待っています...（5秒後に再試行）';
                setTimeout(connectTwitch, 5000); // 5秒後に再チャレ
                return;
            }

            const targetChannel = 'tachinsan'; 
            const client = new tmi.Client({
                connection: { reconnect: true, secure: true },
                channels: [ targetChannel ]
            });

            client.connect().then(() => {
                statusEl.innerText = '接続成功！ (tachinsan 待機中)';
                statusEl.style.color = 'green';
            }).catch(err => {
                statusEl.innerText = '接続失敗: ' + err;
            });

            client.on('message', (channel, tags, message, self) => {
                const log = document.getElementById('log');
                log.innerHTML += `<p><strong>${tags['display-name'] || tags.username}:</strong> ${message}</p>`;
                log.scrollTop = log.scrollHeight;

                const uttr = new SpeechSynthesisUtterance(message);
                uttr.lang = 'ja-JP';
                window.speechSynthesis.speak(uttr);
            });
        }

        // ページが開いてから1秒後に起動
        setTimeout(connectTwitch, 1000);
    </script>
</body>
</html>
