<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Reader (High Speed)</title>
    <script>
    /* tmi.js v1.8.5 直接埋め込み */

</head>
<body style="font-family: sans-serif; background-color: #f0f2f5; padding: 20px; text-align: center;">
    <div style="max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h2 style="color: #6441a5;">Twitch用読み上げくん</h2>
        <p id="status" style="font-weight:bold; color:red; margin-bottom: 20px;">準備完了</p>
        <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
            <button id="btn-start" onclick="connectToTwitch()" style="padding: 12px 25px; font-size: 16px; background: #6441a5; color: white; border: none; border-radius: 10px; cursor: pointer;">接続開始</button>
            <button id="btn-stop" onclick="disconnectFromTwitch()" style="padding: 12px 25px; font-size: 16px; background: #ff4b2b; color: white; border: none; border-radius: 10px; cursor: pointer; display: none;">切断</button>
        </div>
        <div id="log" style="text-align: left; height: 350px; overflow-y: auto; background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; padding: 15px;"></div>
    </div>

    <script>
        let client = null;
        const readingDict = { "w": "わら", "ｗ": "わら", "草": "わら", "初見": "しょけんさんいらっしゃい", "おつ": "おつかれさま", "888": "ぱちぱちぱち" };

        function connectToTwitch() {
            const statusEl = document.getElementById('status');
            const btnStart = document.getElementById('btn-start');
            const btnStop = document.getElementById('btn-stop');
            statusEl.innerText = '接続中...';
            client = new tmi.Client({ channels: ['tachinsan'] });

            client.connect().then(() => {
                statusEl.innerText = '✅ 接続成功！';
                statusEl.style.color = 'green';
                btnStart.style.display = 'none';
                btnStop.style.display = 'inline-block';
            });

            client.onmessage = function(user, message) {
                let speechMessage = message;
                for (let key in readingDict) {
                    const regex = new RegExp(key, 'g');
                    speechMessage = speechMessage.replace(regex, readingDict[key]);
                }

                // 画面ログ表示
                const log = document.getElementById('log');
                const newMsg = document.createElement('div');
                newMsg.style.borderBottom = "1px solid #f0f0f0";
                newMsg.style.padding = "8px 0";
                newMsg.innerHTML = `<span style="color:#6441a5; font-weight:bold;">${user}</span> ＠ ${message}`;
                log.prepend(newMsg);

                // ラグ対策：溜まっている読み上げを一度クリアしてから最新を読む
                window.speechSynthesis.cancel(); 

                const uttr = new SpeechSynthesisUtterance(`${user} ＠ ${speechMessage}`);
                uttr.lang = 'ja-JP';
                uttr.rate = 1.3; // 速度を上げて追いつきやすく
                window.speechSynthesis.speak(uttr);
            };
        }

        function disconnectFromTwitch() {
            if (client) { client.disconnect(); client = null; }
            window.speechSynthesis.cancel();
            document.getElementById('status').innerText = '切断済み';
            document.getElementById('status').style.color = 'red';
            document.getElementById('btn-start').style.display = 'inline-block';
            document.getElementById('btn-stop').style.display = 'none';
        }
    </script>
</body>
</html>
