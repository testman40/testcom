<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Reader</title>
    <script src="https://cdn.jsdelivr.net/npm/tmi.js@1.8.5/dist/tmi.min.js"></script>
</head>
<body style="font-family: sans-serif; padding: 20px;">
    <h1>Twitch 読み上げ</h1>
    <p>状態: <span id="status" style="font-weight:bold; color:red;">起動中...</span></p>
    <div id="log" style="border:1px solid #ccc; padding:10px; height:300px; overflow-y:scroll;"></div>

    <script>
        function start() {
            const statusEl = document.getElementById('status');
            
            if (typeof tmi === 'undefined') {
                statusEl.innerText = 'ライブラリ読込中...（数秒待って更新してください）';
                return;
            }

            const client = new tmi.Client({
                connection: { reconnect: true, secure: true },
                channels: ['tachinsan']
            });

            client.connect().then(() => {
                statusEl.innerText = '接続成功！ (tachinsan)';
                statusEl.style.color = 'green';
            }).catch(err => {
                statusEl.innerText = '接続失敗: ' + err;
            });

            client.on('message', (channel, tags, message, self) => {
                const log = document.getElementById('log');
                log.innerHTML += `<p><strong>${tags['display-name'] || tags.username}:</strong> ${message}</p>`;
                log.scrollTop = log.scrollHeight;

                const uttr = new SpeechSynthesisUtterance(message);
                uttr.lang = 'ja-JP';
                window.speechSynthesis.speak(uttr);
            });
        }

        // 1秒後に起動
        setTimeout(start, 1000);
    </script>
</body>
</html>
