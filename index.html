<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Reader (Custom)</title>
    <script>
    /* tmi.js v1.8.5 直接埋め込み */

<body style="font-family: sans-serif; background-color: #f0f2f5; padding: 20px; text-align: center;">
    <div style="max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h2 style="color: #6441a5; margin-bottom: 5px;">Twitch 読み上げくん</h2>
        <p id="status" style="font-weight:bold; color:red; margin-bottom: 20px;">準備完了</p>
        
        <button onclick="connectToTwitch()" style="padding: 15px 40px; font-size: 18px; background: #6441a5; color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(100, 65, 165, 0.3);">
            接続を開始する
        </button>

        <div id="log" style="margin-top: 30px; text-align: left; height: 350px; overflow-y: auto; background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; padding: 15px; font-size: 16px; line-height: 1.6;">
        </div>
    </div>

    <script>
        function connectToTwitch() {
            const statusEl = document.getElementById('status');
            statusEl.innerText = '接続中...';

            const client = new tmi.Client({ channels: ['tachinsan'] });

            client.connect().then(() => {
                statusEl.innerText = '✅ 接続成功！(tachinsan)';
                statusEl.style.color = 'green';
            }).catch(err => {
                statusEl.innerText = '❌ 失敗: ' + err;
            });

            client.onmessage = function(user, message) {
                const log = document.getElementById('log');
                
                // 表示形式を「ユーザー名＠コメント」に変更
                const formattedText = `${user} ＠ ${message}`;
                
                // 画面に追加
                const newMsg = document.createElement('div');
                newMsg.style.borderBottom = "1px solid #f0f0f0";
                newMsg.style.padding = "8px 0";
                newMsg.innerHTML = `<span style="color:#6441a5; font-weight:bold;">${user}</span> <span style="color:#888;">＠</span> ${message}`;
                log.prepend(newMsg); // 新しいコメントを上に表示

                // 読み上げも「ユーザー名＠コメント」で行う
                const uttr = new SpeechSynthesisUtterance(formattedText);
                uttr.lang = 'ja-JP';
                uttr.rate = 1.2; // 少し早口に設定
                window.speechSynthesis.speak(uttr);
            };
        }
    </script>
</body>
</html>
