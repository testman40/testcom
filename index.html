<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Reader Fixed</title>
    <script src="https://cdn.jsdelivr.net/bundle/npm/tmi.js@1.8.5"></script>
</head>
<body>
    <h1 style="font-size: 18px;">Twitch 読み上げ（完全版）</h1>
    <p>現在の状態: <span id="status" style="font-weight:bold; color:red;">起動中...</span></p>
    <div id="log" style="border:1px solid #ccc; padding:10px; height:300px; overflow-y:scroll; background:#fff;"></div>

    <script>
        // 起動処理
        function init() {
            const statusEl = document.getElementById('status');
            
            // tmiが読み込めているかチェック
            if (typeof tmi === 'undefined') {
                statusEl.innerText = '通信パーツが見つかりません。ページを再読み込みしてください。';
                return;
            }

            const client = new tmi.Client({
                connection: { reconnect: true, secure: true },
                channels: ['tachinsan'] // IDを固定しました
            });

            client.connect().then(() => {
                statusEl.innerText = '接続成功！ (tachinsan 待機中)';
                statusEl.style.color = 'green';
            }).catch(err => {
                statusEl.innerText = '接続失敗: ' + err;
            });

            client.on('message', (channel, tags, message, self) => {
                const log = document.getElementById('log');
                log.innerHTML += `<p><strong>${tags['display-name'] || tags.username}:</strong> ${message}</p>`;
                log.scrollTop = log.scrollHeight;

                const uttr = new SpeechSynthesisUtterance(message);
                uttr.lang = 'ja-JP';
                window.speechSynthesis.speak(uttr);
            });
        }

        // ページ読み込みから1秒後に実行
        setTimeout(init, 1000);
    </script>
</body>
</html>
