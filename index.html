<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Reader (Storage Ver.)</title>
    <script src="https://bundle.run/tmi.js@1.8.5"></script>
</head>
<body style="font-family: sans-serif; background-color: #f0f2f5; padding: 20px; text-align: center;">
    <div style="max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
        <h2 style="color: #6441a5;">Twitch用読み上げくん</h2>
        <p id="status" style="font-weight:bold; color:red; margin-bottom: 20px;">準備完了</p>
        
        <div style="display: flex; gap: 10px; justify-content: center; margin-bottom: 20px;">
            <button id="btn-start" onclick="connectToTwitch()" style="padding: 12px 25px; font-size: 16px; background: #6441a5; color: white; border: none; border-radius: 10px; cursor: pointer;">接続開始</button>
            <button id="btn-stop" onclick="disconnectFromTwitch()" style="padding: 12px 25px; font-size: 16px; background: #ff4b2b; color: white; border: none; border-radius: 10px; cursor: pointer; display: none;">切断</button>
            <button onclick="clearLog()" style="padding: 12px 25px; font-size: 16px; background: #999; color: white; border: none; border-radius: 10px; cursor: pointer;">ログ消去</button>
        </div>

        <div id="log" style="text-align: left; height: 350px; overflow-y: auto; background: #fdfdfd; border: 1px solid #eee; border-radius: 10px; padding: 15px;"></div>
    </div>

    <script>
        let client = null;
        const CHANNEL_NAME = 'tachinsan'; // あなたのID
        const MAX_LOG = 100; // 保存する最大件数
        const readingDict = { "w": "わら", "ｗ": "わら", "草": "わら", "初見": "しょけんさんいらっしゃい", "おつ": "おつかれさま", "888": "ぱちぱちぱち" };

        // 起動時に保存されたログを読み込む
        window.onload = () => {
            const savedLog = JSON.parse(localStorage.getItem('twitch_logs') || '[]');
            savedLog.forEach(item => displayLog(item.time, item.user, item.msg, false));
        };

        function displayLog(time, user, msg, isNew) {
            const log = document.getElementById('log');
            const newMsg = document.createElement('div');
            newMsg.style.borderBottom = "1px solid #f0f0f0";
            newMsg.style.padding = "8px 0";
            newMsg.innerHTML = `<small style="color:gray;">[${time}]</small> <span style="color:#6441a5; font-weight:bold;">${user}</span>: ${msg}`;
            log.prepend(newMsg);

            if (isNew) {
                // 新規コメントなら保存処理
                let logs = JSON.parse(localStorage.getItem('twitch_logs') || '[]');
                logs.push({ time, user, msg });
                if (logs.length > MAX_LOG) logs.shift();
                localStorage.setItem('twitch_logs', JSON.stringify(logs));
            }
        }

        function clearLog() {
            if(confirm("ログをすべて消去しますか？")) {
                localStorage.removeItem('twitch_logs');
                document.getElementById('log').innerHTML = '';
            }
        }

        function connectToTwitch() {
            const statusEl = document.getElementById('status');
            statusEl.innerText = '接続中...';
            client = new tmi.Client({ channels: [CHANNEL_NAME] });

            client.connect().then(() => {
                statusEl.innerText = '✅ 接続成功！';
                statusEl.style.color = 'green';
                document.getElementById('btn-start').style.display = 'none';
                document.getElementById('btn-stop').style.display = 'inline-block';
            });

            client.onmessage = (user, message) => {
                const now = new Date();
                const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

                displayLog(timeStr, user, message, true);

                // 読み上げ処理
                let speechMessage = message;
                for (let key in readingDict) {
                    speechMessage = speechMessage.replace(new RegExp(key, 'g'), readingDict[key]);
                }
                
                // 読み上げ予約（既に喋っていてもキューに追加される）
                const uttr = new SpeechSynthesisUtterance(`${user} ＠ ${speechMessage}`);
                uttr.lang = 'ja-JP';
                uttr.rate = 1.3;
                window.speechSynthesis.speak(uttr);
            };
        }

        function disconnectFromTwitch() {
            if (client) { client.disconnect(); client = null; }
            window.speechSynthesis.cancel();
            document.getElementById('status').innerText = '切断済み';
            document.getElementById('status').style.color = 'red';
            document.getElementById('btn-start').style.display = 'inline-block';
            document.getElementById('btn-stop').style.display = 'none';
        }
    </script>
</body>
</html>
