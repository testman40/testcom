<html lang="ja">
<head>

    <script>

<body style="font-family: sans-serif; text-align: center; padding: 50px; background: #fafafa;">
    <div style="background: white; display: inline-block; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
        <h2 style="color: #6441a5;">Twitch 読み上げくん</h2>
        <p id="status" style="font-weight:bold; color:red;">準備完了</p>
        <button onclick="connectToTwitch()" style="padding: 15px 30px; font-size: 18px; background: #6441a5; color: white; border: none; border-radius: 10px; cursor: pointer;">接続を開始する</button>
        <div id="log" style="margin-top: 20px; text-align: left; height: 100px; overflow-y: auto; font-size: 14px; border-top: 1px solid #eee; padding-top: 10px;"></div>
    </div>

    <script>
        function connectToTwitch() {
            const statusEl = document.getElementById('status');
            statusEl.innerText = '接続中...';

            try {
                // 内蔵された tmi.Client を使用
                const client = new tmi.Client({
                    channels: ['tachinsan']
                });

                client.connect().then(() => {
                    statusEl.innerText = '✅ 接続成功！';
                    statusEl.style.color = 'green';
                }).catch(err => {
                    statusEl.innerText = '❌ 失敗: ' + err;
                });

                // メッセージ受信時の処理（独自構成）
                client.onmessage = function(user, message) {
                    const log = document.getElementById('log');
                    log.innerHTML += `<div><strong>${user}:</strong> ${message}</div>`;
                    log.scrollTop = log.scrollHeight;

                    const uttr = new SpeechSynthesisUtterance(message);
                    uttr.lang = 'ja-JP';
                    window.speechSynthesis.speak(uttr);
                };

            } catch (e) {
                statusEl.innerText = 'エラー: ' + e.message;
            }
        }
    </script>
</body>
</html>
