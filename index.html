<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Reader Fixed</title>

<body style="font-family: sans-serif; text-align: center; padding-top: 50px; background: #f0f0f0;">
    <div style="background: white; display: inline-block; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
        <h2>Twitch 読み上げくん</h2>
        <p>状態: <span id="status" style="font-weight:bold; color:red;">準備完了</span></p>
        <button onclick="connect()" style="padding: 15px 30px; font-size: 18px; background: #6441a5; color: white; border: none; border-radius: 10px; cursor: pointer;">接続を開始する</button>
        <div id="log" style="margin-top: 20px; text-align: left; height: 100px; overflow-y: auto; font-size: 12px; color: #666;"></div>
    </div>

    <script>
        function connect() {
            const statusEl = document.getElementById('status');
            statusEl.innerText = '接続中...';

            // tmiが内蔵されているので、必ず動きます
            try {
                const client = new tmi.Client({
                    connection: { reconnect: true, secure: true },
                    channels: ['tachinsan']
                });

                client.connect().then(() => {
                    statusEl.innerText = '✅ 接続成功！';
                    statusEl.style.color = 'green';
                }).catch(err => {
                    statusEl.innerText = '❌ 失敗: ' + err;
                });

                client.on('message', (channel, tags, message, self) => {
                    const uttr = new SpeechSynthesisUtterance(message);
                    uttr.lang = 'ja-JP';
                    window.speechSynthesis.speak(uttr);
                    document.getElementById('log').innerText = "受信: " + message;
                });
            } catch (e) {
                statusEl.innerText = 'エラー: ' + e.message;
            }
        }
    </script>
</body>
</html>
